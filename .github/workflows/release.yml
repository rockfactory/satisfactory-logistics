name: Release

on:
  workflow_dispatch:
    inputs:
      increment:
        description: 'Version bump'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run release-it
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx release-it ${{ inputs.increment }} --ci

      - name: Trigger Render production deploy
        env:
          HOOK_URL: ${{ secrets.RENDER_PROD_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "RENDER_PROD_DEPLOY_HOOK_URL secret is not set" >&2
            exit 1
          fi
          curl -fsSL -X POST "$HOOK_URL"
